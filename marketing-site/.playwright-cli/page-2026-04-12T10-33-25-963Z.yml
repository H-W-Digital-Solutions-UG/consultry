    - generic [ref=e223]:
      - generic [ref=e224]:
        - paragraph [ref=e225]: HÄUFIG GESTELLTE FRAGEN
        - heading "Noch Fragen? Hier sind Antworten." [level=2] [ref=e226]
        - paragraph [ref=e227]: Falls Sie die Antwort hier nicht finden, kontaktieren Sie unser Team jederzeit.
      - generic [ref=e229]:
        - generic [ref=e230]:
          - button "Was unterscheidet Consultry von einem Standard-CRM?" [expanded] [ref=e231] [cursor=pointer]:
            - generic [ref=e232]: Was unterscheidet Consultry von einem Standard-CRM?
            - img [ref=e233]
          - paragraph [ref=e237]: Consultry ist kein generisches CRM, sondern ein AI-natives operatives System für Beratungen. Statt nur Pipeline-Daten zu pflegen, verbindet die Plattform Marktintelligenz, Berater-Matching, Angebotserstellung, Delivery-Steuerung und Wissensrückfluss in einem durchgängigen Workflow.
        - generic [ref=e238]:
          - button "Ist Consultry DSGVO-konform?" [ref=e239] [cursor=pointer]:
            - generic [ref=e240]: Ist Consultry DSGVO-konform?
            - img [ref=e241]
          - paragraph [ref=e243]: Ja. Consultry wird in der EU gehostet, verarbeitet keine Daten ausserhalb der EU und implementiert Privacy-by-Design. Consent-Management fuer Outreach-Kontakte ist integriert. Fuer Berater-Profiling bieten wir Feature-Gates, die erst nach dokumentierter Betriebsvereinbarung freigeschaltet werden.
        - generic [ref=e244]:
          - button "Wie lange dauert das Onboarding?" [ref=e245] [cursor=pointer]:
            - generic [ref=e246]: Wie lange dauert das Onboarding?
            - img [ref=e247]
          - paragraph [ref=e249]: Starter-Kunden sind in unter 2 Wochen produktiv. Professional-Kunden in 2 bis 4 Wochen. Enterprise-Onboarding umfasst Datenimport, Konfiguration und Schulung und dauert 4 bis 8 Wochen.
        - generic [ref=e250]:
          - button "Welche Tools kann Consultry ersetzen?" [ref=e251] [cursor=pointer]:
            - generic [ref=e252]: Welche Tools kann Consultry ersetzen?
            - img [ref=e253]
          - paragraph [ref=e255]: Consultry ersetzt nicht blind jedes bestehende System. Die Plattform übernimmt aber genau die Lücken zwischen Markt, Team, Angebot, Delivery und Wissen, die heute oft über CRM, Excel, Dokumente und Chat-Threads verteilt sind.
        - generic [ref=e256]:
          - button "Gibt es eine kostenlose Testversion?" [ref=e257] [cursor=pointer]:
            - generic [ref=e258]: Gibt es eine kostenlose Testversion?
            - img [ref=e259]
          - paragraph [ref=e261]: Wir bieten eine gefuehrte Pilotphase statt einer anonymen Testversion. In 2 bis 4 Wochen arbeiten Sie mit Ihren echten Daten und sehen den Wert in Ihrer Beratung. Ohne Risiko - wenn es nicht passt, kein Vertrag.
        - generic [ref=e262]:
          - button "Wie funktioniert das KI-gestuetzte Berater-Matching?" [ref=e263] [cursor=pointer]:
            - generic [ref=e264]: Wie funktioniert das KI-gestuetzte Berater-Matching?
            - img [ref=e265]
          - paragraph [ref=e267]: Consultry kombiniert Projektanforderungen mit Skills, Branchenerfahrung, Verfuegbarkeit, Standort und Teamkontext. Dadurch entstehen belastbare Vorschlaege fuer passende Besetzungen und nicht nur einfache Keyword-Treffer.
        - generic [ref=e268]:
          - button "Koennen wir Consultry mit bestehenden Tools integrieren?" [ref=e269] [cursor=pointer]:
            - generic [ref=e270]: Koennen wir Consultry mit bestehenden Tools integrieren?
            - img [ref=e271]
          - paragraph [ref=e273]: Ja. Standard-Integrationen decken Outlook, Gmail, Slack, Teams, Google Calendar, Personio und DATEV ab. Fuer komplexere Umgebungen stehen Webhooks, APIs und SSO-Optionen bereit.
        - generic [ref=e274]:
          - button "Fuer welche Unternehmensgroesse ist Consultry geeignet?" [ref=e275] [cursor=pointer]:
            - generic [ref=e276]: Fuer welche Unternehmensgroesse ist Consultry geeignet?
            - img [ref=e277]
          - paragraph [ref=e279]: Der aktuelle Fokus liegt auf Beratungen mit etwa 30 bis 200 Mitarbeitenden, die Bestandskunden, Staffing, Angebot und Delivery sauber in einem System zusammenziehen wollen.
        - generic [ref=e280]:
          - button "Was passiert mit unseren bestehenden CVs und Daten?" [ref=e281] [cursor=pointer]:
            - generic [ref=e282]: Was passiert mit unseren bestehenden CVs und Daten?
            - img [ref=e283]
          - paragraph [ref=e285]: Im Onboarding importiert Consultry Ihre bestehenden CVs, Kundendaten und Projekthistorie. Die AI extrahiert und normalisiert Skills automatisch. Kein manuelles Abtippen.
