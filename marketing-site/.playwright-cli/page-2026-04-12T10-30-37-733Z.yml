    - generic [ref=e222]:
      - generic [ref=e223]:
        - paragraph [ref=e224]: HÄUFIG GESTELLTE FRAGEN
        - heading "Noch Fragen? Hier sind Antworten." [level=2] [ref=e225]
        - paragraph [ref=e226]: Falls Sie die Antwort hier nicht finden, kontaktieren Sie unser Team jederzeit.
      - generic [ref=e228]:
        - generic [ref=e229]:
          - button "Was unterscheidet Consultry von einem Standard-CRM?" [expanded] [ref=e230] [cursor=pointer]:
            - generic [ref=e231]: Was unterscheidet Consultry von einem Standard-CRM?
            - img [ref=e232]
          - paragraph [ref=e236]: Consultry ist kein generisches CRM, sondern ein AI-natives operatives System für Beratungen. Statt nur Pipeline-Daten zu pflegen, verbindet die Plattform Marktintelligenz, Berater-Matching, Angebotserstellung, Delivery-Steuerung und Wissensrückfluss in einem durchgängigen Workflow.
        - generic [ref=e237]:
          - button "Ist Consultry DSGVO-konform?" [ref=e238] [cursor=pointer]:
            - generic [ref=e239]: Ist Consultry DSGVO-konform?
            - img [ref=e240]
          - paragraph [ref=e242]: Ja. Consultry wird in der EU gehostet, verarbeitet keine Daten ausserhalb der EU und implementiert Privacy-by-Design. Consent-Management fuer Outreach-Kontakte ist integriert. Fuer Berater-Profiling bieten wir Feature-Gates, die erst nach dokumentierter Betriebsvereinbarung freigeschaltet werden.
        - generic [ref=e243]:
          - button "Wie lange dauert das Onboarding?" [ref=e244] [cursor=pointer]:
            - generic [ref=e245]: Wie lange dauert das Onboarding?
            - img [ref=e246]
          - paragraph [ref=e248]: Starter-Kunden sind in unter 2 Wochen produktiv. Professional-Kunden in 2 bis 4 Wochen. Enterprise-Onboarding umfasst Datenimport, Konfiguration und Schulung und dauert 4 bis 8 Wochen.
        - generic [ref=e249]:
          - button "Welche Tools kann Consultry ersetzen?" [ref=e250] [cursor=pointer]:
            - generic [ref=e251]: Welche Tools kann Consultry ersetzen?
            - img [ref=e252]
          - paragraph [ref=e254]: Consultry ersetzt nicht blind jedes bestehende System. Die Plattform übernimmt aber genau die Lücken zwischen Markt, Team, Angebot, Delivery und Wissen, die heute oft über CRM, Excel, Dokumente und Chat-Threads verteilt sind.
        - generic [ref=e255]:
          - button "Gibt es eine kostenlose Testversion?" [ref=e256] [cursor=pointer]:
            - generic [ref=e257]: Gibt es eine kostenlose Testversion?
            - img [ref=e258]
          - paragraph [ref=e260]: Wir bieten eine gefuehrte Pilotphase statt einer anonymen Testversion. In 2 bis 4 Wochen arbeiten Sie mit Ihren echten Daten und sehen den Wert in Ihrer Beratung. Ohne Risiko - wenn es nicht passt, kein Vertrag.
        - generic [ref=e261]:
          - button "Wie funktioniert das KI-gestuetzte Berater-Matching?" [ref=e262] [cursor=pointer]:
            - generic [ref=e263]: Wie funktioniert das KI-gestuetzte Berater-Matching?
            - img [ref=e264]
          - paragraph [ref=e266]: Consultry kombiniert Projektanforderungen mit Skills, Branchenerfahrung, Verfuegbarkeit, Standort und Teamkontext. Dadurch entstehen belastbare Vorschlaege fuer passende Besetzungen und nicht nur einfache Keyword-Treffer.
        - generic [ref=e267]:
          - button "Koennen wir Consultry mit bestehenden Tools integrieren?" [ref=e268] [cursor=pointer]:
            - generic [ref=e269]: Koennen wir Consultry mit bestehenden Tools integrieren?
            - img [ref=e270]
          - paragraph [ref=e272]: Ja. Standard-Integrationen decken Outlook, Gmail, Slack, Teams, Google Calendar, Personio und DATEV ab. Fuer komplexere Umgebungen stehen Webhooks, APIs und SSO-Optionen bereit.
        - generic [ref=e273]:
          - button "Fuer welche Unternehmensgroesse ist Consultry geeignet?" [ref=e274] [cursor=pointer]:
            - generic [ref=e275]: Fuer welche Unternehmensgroesse ist Consultry geeignet?
            - img [ref=e276]
          - paragraph [ref=e278]: Der aktuelle Fokus liegt auf Beratungen mit etwa 30 bis 200 Mitarbeitenden, die Bestandskunden, Staffing, Angebot und Delivery sauber in einem System zusammenziehen wollen.
        - generic [ref=e279]:
          - button "Was passiert mit unseren bestehenden CVs und Daten?" [ref=e280] [cursor=pointer]:
            - generic [ref=e281]: Was passiert mit unseren bestehenden CVs und Daten?
            - img [ref=e282]
          - paragraph [ref=e284]: Im Onboarding importiert Consultry Ihre bestehenden CVs, Kundendaten und Projekthistorie. Die AI extrahiert und normalisiert Skills automatisch. Kein manuelles Abtippen.
