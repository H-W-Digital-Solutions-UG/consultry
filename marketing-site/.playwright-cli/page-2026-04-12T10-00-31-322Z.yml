    - generic [ref=e226]:
      - generic [ref=e227]:
        - paragraph [ref=e228]: HÄUFIG GESTELLTE FRAGEN
        - heading "Noch Fragen? Hier sind Antworten." [level=2] [ref=e229]
        - paragraph [ref=e230]: Falls Sie die Antwort hier nicht finden, kontaktieren Sie unser Team jederzeit.
      - generic [ref=e232]:
        - generic [ref=e233]:
          - button "Was unterscheidet Consultry von einem Standard-CRM?" [expanded] [ref=e234] [cursor=pointer]:
            - generic [ref=e235]: Was unterscheidet Consultry von einem Standard-CRM?
            - img [ref=e236]
          - paragraph [ref=e240]: Consultry ist kein generisches CRM, sondern ein AI-natives operatives System für Beratungen. Statt nur Pipeline-Daten zu pflegen, verbindet die Plattform Marktintelligenz, Berater-Matching, Angebotserstellung, Delivery-Steuerung und Wissensrückfluss in einem durchgängigen Workflow.
        - generic [ref=e241]:
          - button "Ist Consultry DSGVO-konform?" [ref=e242] [cursor=pointer]:
            - generic [ref=e243]: Ist Consultry DSGVO-konform?
            - img [ref=e244]
          - paragraph [ref=e246]: Ja. Consultry wird in der EU gehostet, verarbeitet keine Daten ausserhalb der EU und implementiert Privacy-by-Design. Consent-Management fuer Outreach-Kontakte ist integriert. Fuer Berater-Profiling bieten wir Feature-Gates, die erst nach dokumentierter Betriebsvereinbarung freigeschaltet werden.
        - generic [ref=e247]:
          - button "Wie lange dauert das Onboarding?" [ref=e248] [cursor=pointer]:
            - generic [ref=e249]: Wie lange dauert das Onboarding?
            - img [ref=e250]
          - paragraph [ref=e252]: Starter-Kunden sind in unter 2 Wochen produktiv. Professional-Kunden in 2 bis 4 Wochen. Enterprise-Onboarding umfasst Datenimport, Konfiguration und Schulung und dauert 4 bis 8 Wochen.
        - generic [ref=e253]:
          - button "Welche Tools kann Consultry ersetzen?" [ref=e254] [cursor=pointer]:
            - generic [ref=e255]: Welche Tools kann Consultry ersetzen?
            - img [ref=e256]
          - paragraph [ref=e258]: Consultry ersetzt nicht blind jedes bestehende System. Die Plattform übernimmt aber genau die Lücken zwischen Markt, Team, Angebot, Delivery und Wissen, die heute oft über CRM, Excel, Dokumente und Chat-Threads verteilt sind.
        - generic [ref=e259]:
          - button "Gibt es eine kostenlose Testversion?" [ref=e260] [cursor=pointer]:
            - generic [ref=e261]: Gibt es eine kostenlose Testversion?
            - img [ref=e262]
          - paragraph [ref=e264]: Wir bieten eine gefuehrte Pilotphase statt einer anonymen Testversion. In 2 bis 4 Wochen arbeiten Sie mit Ihren echten Daten und sehen den Wert in Ihrer Beratung. Ohne Risiko - wenn es nicht passt, kein Vertrag.
        - generic [ref=e265]:
          - button "Wie funktioniert das KI-gestuetzte Berater-Matching?" [ref=e266] [cursor=pointer]:
            - generic [ref=e267]: Wie funktioniert das KI-gestuetzte Berater-Matching?
            - img [ref=e268]
          - paragraph [ref=e270]: Consultry kombiniert Projektanforderungen mit Skills, Branchenerfahrung, Verfuegbarkeit, Standort und Teamkontext. Dadurch entstehen belastbare Vorschlaege fuer passende Besetzungen und nicht nur einfache Keyword-Treffer.
        - generic [ref=e271]:
          - button "Koennen wir Consultry mit bestehenden Tools integrieren?" [ref=e272] [cursor=pointer]:
            - generic [ref=e273]: Koennen wir Consultry mit bestehenden Tools integrieren?
            - img [ref=e274]
          - paragraph [ref=e276]: Ja. Standard-Integrationen decken Outlook, Gmail, Slack, Teams, Google Calendar, Personio und DATEV ab. Fuer komplexere Umgebungen stehen Webhooks, APIs und SSO-Optionen bereit.
        - generic [ref=e277]:
          - button "Fuer welche Unternehmensgroesse ist Consultry geeignet?" [ref=e278] [cursor=pointer]:
            - generic [ref=e279]: Fuer welche Unternehmensgroesse ist Consultry geeignet?
            - img [ref=e280]
          - paragraph [ref=e282]: Der aktuelle Fokus liegt auf Beratungen mit etwa 30 bis 200 Mitarbeitenden, die Bestandskunden, Staffing, Angebot und Delivery sauber in einem System zusammenziehen wollen.
        - generic [ref=e283]:
          - button "Was passiert mit unseren bestehenden CVs und Daten?" [ref=e284] [cursor=pointer]:
            - generic [ref=e285]: Was passiert mit unseren bestehenden CVs und Daten?
            - img [ref=e286]
          - paragraph [ref=e288]: Im Onboarding importiert Consultry Ihre bestehenden CVs, Kundendaten und Projekthistorie. Die AI extrahiert und normalisiert Skills automatisch. Kein manuelles Abtippen.
