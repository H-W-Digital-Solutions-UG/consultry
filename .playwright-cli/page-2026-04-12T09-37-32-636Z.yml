      - generic [ref=e284]:
        - paragraph [ref=e285]: HÄUFIG GESTELLTE FRAGEN
        - heading "Noch Fragen? Hier sind Antworten." [level=2] [ref=e286]
        - paragraph [ref=e287]: Falls Sie die Antwort hier nicht finden, kontaktieren Sie unser Team jederzeit.
      - generic [ref=e289]:
        - generic [ref=e290]:
          - button "Was unterscheidet Consultry von einem Standard-CRM?" [expanded] [ref=e291] [cursor=pointer]:
            - generic [ref=e292]: Was unterscheidet Consultry von einem Standard-CRM?
            - img [ref=e293]
          - paragraph [ref=e297]: Consultry ist kein generisches CRM, sondern ein AI-natives operatives System für Beratungen. Statt nur Pipeline-Daten zu pflegen, verbindet die Plattform Marktintelligenz, Berater-Matching, Angebotserstellung, Delivery-Steuerung und Wissensrückfluss in einem durchgängigen Workflow.
        - generic [ref=e298]:
          - button "Ist Consultry DSGVO-konform?" [ref=e299] [cursor=pointer]:
            - generic [ref=e300]: Ist Consultry DSGVO-konform?
            - img [ref=e301]
          - paragraph [ref=e303]: Ja. Consultry wird in der EU gehostet, verarbeitet keine Daten ausserhalb der EU und implementiert Privacy-by-Design. Consent-Management fuer Outreach-Kontakte ist integriert. Fuer Berater-Profiling bieten wir Feature-Gates, die erst nach dokumentierter Betriebsvereinbarung freigeschaltet werden.
        - generic [ref=e304]:
          - button "Wie lange dauert das Onboarding?" [ref=e305] [cursor=pointer]:
            - generic [ref=e306]: Wie lange dauert das Onboarding?
            - img [ref=e307]
          - paragraph [ref=e309]: Starter-Kunden sind in unter 2 Wochen produktiv. Professional-Kunden in 2 bis 4 Wochen. Enterprise-Onboarding umfasst Datenimport, Konfiguration und Schulung und dauert 4 bis 8 Wochen.
        - generic [ref=e310]:
          - button "Welche Tools kann Consultry ersetzen?" [ref=e311] [cursor=pointer]:
            - generic [ref=e312]: Welche Tools kann Consultry ersetzen?
            - img [ref=e313]
          - paragraph [ref=e315]: Consultry ersetzt nicht blind jedes bestehende System. Die Plattform übernimmt aber genau die Lücken zwischen Markt, Team, Angebot, Delivery und Wissen, die heute oft über CRM, Excel, Dokumente und Chat-Threads verteilt sind.
        - generic [ref=e316]:
          - button "Gibt es eine kostenlose Testversion?" [ref=e317] [cursor=pointer]:
            - generic [ref=e318]: Gibt es eine kostenlose Testversion?
            - img [ref=e319]
          - paragraph [ref=e321]: Wir bieten eine gefuehrte Pilotphase statt einer anonymen Testversion. In 2 bis 4 Wochen arbeiten Sie mit Ihren echten Daten und sehen den Wert in Ihrer Beratung. Ohne Risiko - wenn es nicht passt, kein Vertrag.
        - generic [ref=e322]:
          - button "Wie funktioniert das KI-gestuetzte Berater-Matching?" [ref=e323] [cursor=pointer]:
            - generic [ref=e324]: Wie funktioniert das KI-gestuetzte Berater-Matching?
            - img [ref=e325]
          - paragraph [ref=e327]: Consultry kombiniert Projektanforderungen mit Skills, Branchenerfahrung, Verfuegbarkeit, Standort und Teamkontext. Dadurch entstehen belastbare Vorschlaege fuer passende Besetzungen und nicht nur einfache Keyword-Treffer.
        - generic [ref=e328]:
          - button "Koennen wir Consultry mit bestehenden Tools integrieren?" [ref=e329] [cursor=pointer]:
            - generic [ref=e330]: Koennen wir Consultry mit bestehenden Tools integrieren?
            - img [ref=e331]
          - paragraph [ref=e333]: Ja. Standard-Integrationen decken Outlook, Gmail, Slack, Teams, Google Calendar, Personio und DATEV ab. Fuer komplexere Umgebungen stehen Webhooks, APIs und SSO-Optionen bereit.
        - generic [ref=e334]:
          - button "Fuer welche Unternehmensgroesse ist Consultry geeignet?" [ref=e335] [cursor=pointer]:
            - generic [ref=e336]: Fuer welche Unternehmensgroesse ist Consultry geeignet?
            - img [ref=e337]
          - paragraph [ref=e339]: Der aktuelle Fokus liegt auf Beratungen mit etwa 30 bis 200 Mitarbeitenden, die Bestandskunden, Staffing, Angebot und Delivery sauber in einem System zusammenziehen wollen.
        - generic [ref=e340]:
          - button "Was passiert mit unseren bestehenden CVs und Daten?" [ref=e341] [cursor=pointer]:
            - generic [ref=e342]: Was passiert mit unseren bestehenden CVs und Daten?
            - img [ref=e343]
          - paragraph [ref=e345]: Im Onboarding importiert Consultry Ihre bestehenden CVs, Kundendaten und Projekthistorie. Die AI extrahiert und normalisiert Skills automatisch. Kein manuelles Abtippen.
