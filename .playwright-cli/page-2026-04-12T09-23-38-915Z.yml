      - generic [ref=e238]:
        - generic [ref=e239]:
          - button "Ist Consultry DSGVO-konform?" [expanded] [ref=e240] [cursor=pointer]:
            - generic [ref=e241]: Ist Consultry DSGVO-konform?
            - img [ref=e242]
          - paragraph [ref=e246]: Ja. Consultry wird in der EU gehostet, verarbeitet keine Daten ausserhalb der EU und implementiert Privacy-by-Design. Consent-Management fuer Outreach-Kontakte ist integriert. Fuer Berater-Profiling bieten wir Feature-Gates, die erst nach dokumentierter Betriebsvereinbarung freigeschaltet werden.
        - generic [ref=e247]:
          - button "Wie lange dauert das Onboarding?" [ref=e248] [cursor=pointer]:
            - generic [ref=e249]: Wie lange dauert das Onboarding?
            - img [ref=e250]
          - paragraph [ref=e252]: Starter-Kunden sind in unter 2 Wochen produktiv. Professional-Kunden in 2 bis 4 Wochen. Enterprise-Onboarding umfasst Datenimport, Konfiguration und Schulung und dauert 4 bis 8 Wochen.
        - generic [ref=e253]:
          - button "Welche Integrationen bietet Consultry?" [ref=e254] [cursor=pointer]:
            - generic [ref=e255]: Welche Integrationen bietet Consultry?
            - img [ref=e256]
          - paragraph [ref=e258]: "Standard-Integrationen: Outlook/Gmail, Slack/Teams, Google Calendar, Personio und DATEV. Premium: Salesforce, HubSpot, SAP SuccessFactors, Gulp und Dealfront. Enterprise: Custom API, Webhooks und SSO."
        - generic [ref=e259]:
          - button "Kann ich Consultry neben unserem bestehenden CRM nutzen?" [ref=e260] [cursor=pointer]:
            - generic [ref=e261]: Kann ich Consultry neben unserem bestehenden CRM nutzen?
            - img [ref=e262]
          - paragraph [ref=e264]: Ja, Parallel-Betrieb ist moeglich. Consultry ist aber kein CRM-Add-on, sondern ein eigenstaendiges operatives System, das speziell fuer die Dienstleistungslogik von Beratungen gebaut wurde. Bestehende CRM-Daten koennen importiert werden.
        - generic [ref=e265]:
          - button "Gibt es eine kostenlose Testversion?" [ref=e266] [cursor=pointer]:
            - generic [ref=e267]: Gibt es eine kostenlose Testversion?
            - img [ref=e268]
          - paragraph [ref=e270]: Wir bieten eine gefuehrte Pilotphase statt einer anonymen Testversion. In 2 bis 4 Wochen arbeiten Sie mit Ihren echten Daten und sehen den Wert in Ihrer Beratung. Ohne Risiko - wenn es nicht passt, kein Vertrag.
        - generic [ref=e271]:
          - button "Was passiert mit unseren bestehenden CVs und Daten?" [ref=e272] [cursor=pointer]:
            - generic [ref=e273]: Was passiert mit unseren bestehenden CVs und Daten?
            - img [ref=e274]
          - paragraph [ref=e276]: Im Onboarding importiert Consultry Ihre bestehenden CVs, Kundendaten und Projekthistorie. Die AI extrahiert und normalisiert Skills automatisch. Kein manuelles Abtippen.
