    - generic [ref=e65]:
      - generic [ref=e66]:
        - paragraph [ref=e67]: UNSERE GESCHICHTE
        - heading "Beratungen verdienen ein System, das ihre Logik versteht." [level=2] [ref=e68]
        - generic [ref=e69]:
          - paragraph [ref=e70]: "Consultry entstand aus einer simplen Beobachtung: Beratungen koordinieren hochkomplexe Arbeit mit Werkzeugen, die nie fuer Beratungslogik gebaut wurden. Marktsignale landen in Newslettern, Staffing in Tabellen, Angebote in PowerPoints und Delivery-Wissen in verstreuten Dokumenten."
          - paragraph [ref=e71]: Was in der Praxis fehlt, ist kein weiteres Feature und kein neues Add-on fuer ein generisches CRM. Es fehlt eine gemeinsame operative Ebene, die erkennt, was der Markt verlangt, welches Team wirklich passt, wie ein Angebot schneller belastbar wird und wie Projektwissen wieder ins naechste Mandat zurueckfliesst.
          - paragraph [ref=e72]: Deshalb haben wir Consultry als AI-natives operatives System konzipiert. Nicht AI-angeflanscht, sondern von Grund auf auf Kontext, Zusammenarbeit und Beratungsprozesse ausgelegt. Das System versteht Signale, Teamkonstellationen, Delivery-Risiken und Wissensbausteine als zusammenhaengenden Workflow.
          - paragraph [ref=e73]: "Unser Ziel ist kein lauter Software-Layer ueber bestehenden Prozessen, sondern ein ruhigeres, klareres Betriebssystem fuer moderne Beratungshaeuser im DACH-Raum: weniger Kontextwechsel, bessere operative Entscheidungen und ein Setup, das die Realitaet von Beratung respektiert."
