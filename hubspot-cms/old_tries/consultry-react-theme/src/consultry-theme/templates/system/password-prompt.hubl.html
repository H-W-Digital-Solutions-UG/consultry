<!--
  templateType: page
  isAvailableForNewContent: false
  label: Consultry — Password Prompt
-->
{% extends "../layouts/base.hubl.html" %}

{% block body %}
  <section style="padding: calc(72px + var(--mktg-space-3xl)) var(--mktg-page-padding) var(--mktg-space-3xl); display: flex; align-items: center; justify-content: center; min-height: 70vh;">
    <div style="max-width: 420px; width: 100%; background-color: var(--neutral-0); border: var(--mktg-border-subtle); border-radius: var(--mktg-radius-xl); padding: var(--mktg-space-xl);">
      <h1 class="display-sm" style="text-align: center; margin-bottom: var(--mktg-space-sm);">Passwort erforderlich</h1>
      <p class="body-md" style="text-align: center; color: var(--neutral-700); margin-bottom: var(--mktg-space-lg);">
        Diese Seite ist passwortgeschützt.
      </p>
      {% password_prompt "password_prompt" %}
    </div>
  </section>
{% endblock body %}
